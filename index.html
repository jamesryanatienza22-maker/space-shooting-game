<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arcade Space Shooter</title>
<style>
  body { margin:0; overflow:hidden; background:black; font-family:Arial; color:white; }
  canvas { display:block; margin:0 auto; background:#000; touch-action:none; }
  #score { position:absolute; top:10px; left:10px; font-size:24px; z-index:10; }
  .button {
    position: fixed;
    bottom: 10px;
    width: 80px;
    height: 80px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    text-align: center;
    line-height: 80px;
    font-size: 24px;
    user-select:none;
    z-index:10;
  }
  #left { left: 10px; }
  #right { left: 100px; }
  #shoot { right: 10px; }
  #startOverlay {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.85);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    text-align:center;
    cursor:pointer;
    z-index:100;
  }
</style>
</head>
<body>

<div id="score">Score: 0</div>
<canvas id="gameCanvas"></canvas>

<!-- Mobile buttons -->
<div id="left" class="button">&#8592;</div>
<div id="right" class="button">&#8594;</div>
<div id="shoot" class="button">&#9679;</div>

<!-- Start overlay -->
<div id="startOverlay">CLICK OR TAP TO START</div>

<script>
// Canvas
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Game variables
let score=0, bullets=[], enemies=[], explosions=[], gameOver=false;
let keys={};

// Load images
const playerImg = new Image(); playerImg.src='spaceship.png';
const enemyImg = new Image(); enemyImg.src='meteor.png';

// Load sounds
const shootSound = new Audio('shoot.mp3');
const explosionSound = new Audio('explosion.mp3');

// Player
const player={ width:50, height:50, x:canvas.width/2-25, y:canvas.height-80, speed:7 };

// Controls
document.addEventListener('keydown', e=>keys[e.code]=true);
document.addEventListener('keyup', e=>keys[e.code]=false);
document.getElementById('left').addEventListener('touchstart', ()=>keys['ArrowLeft']=true);
document.getElementById('left').addEventListener('touchend', ()=>keys['ArrowLeft']=false);
document.getElementById('right').addEventListener('touchstart', ()=>keys['ArrowRight']=true);
document.getElementById('right').addEventListener('touchend', ()=>keys['ArrowRight']=false);
document.getElementById('shoot').addEventListener('touchstart', ()=>{ if(!keys.shootCooldown){ shoot(); keys.shootCooldown=15;} });

// Shoot bullets
function shoot(){
  bullets.push({ x:player.x+player.width/2-5, y:player.y, width:10, height:20, speed:10 });
  shootSound.currentTime=0; shootSound.play();
}

// Create enemy
function createEnemy(){ const x=Math.random()*(canvas.width-50); enemies.push({x:x,y:-50,width:50,height:50,speed:3+Math.random()*2}); }

// Collision
function isColliding(a,b){ return a.x<b.x+b.width && a.x+a.width>b.x && a.y<b.y+b.height && a.y+a.height>b.y; }

// Explosions
function addExplosion(x,y){ explosions.push({x,y,radius:0,maxRadius:20}); explosionSound.currentTime=0; explosionSound.play(); }

// Restart
function restartGame(){ score=0; bullets=[]; enemies=[]; explosions=[]; player.x=canvas.width/2-player.width/2; gameOver=false; }

// Update
function update(){
  if(gameOver) return;
  if(keys['ArrowLeft'] && player.x>0) player.x-=player.speed;
  if(keys['ArrowRight'] && player.x+player.width<canvas.width) player.x+=player.speed;
  if(keys['Space']){ if(!keys.shootCooldown){ shoot(); keys.shootCooldown=15;}}
  if(keys.shootCooldown) keys.shootCooldown--;
  
  bullets.forEach((b,i)=>{ b.y-=b.speed; if(b.y<-b.height) bullets.splice(i,1); });
  enemies.forEach((e,i)=>{
    e.y+=e.speed;
    if(isColliding(player,e)){ gameOver=true; setTimeout(restartGame,500);}
    if(e.y>canvas.height) enemies.splice(i,1);
  });
  bullets.forEach((b,bi)=>{ enemies.forEach((e,ei)=>{ if(isColliding(b,e)){ addExplosion(e.x+e.width/2,e.y+e.height/2); bullets.splice(bi,1); enemies.splice(ei,1); score++; } }); });
  explosions.forEach((ex,i)=>{ ex.radius+=2; if(ex.radius>ex.maxRadius) explosions.splice(i,1); });
  if(Math.random()<0.02) createEnemy();
  draw(); requestAnimationFrame(update);
}

// Draw
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
  ctx.fillStyle='yellow'; bullets.forEach(b=>ctx.fillRect(b.x,b.y,b.width,b.height));
  enemies.forEach(e=>ctx.drawImage(enemyImg, e.x, e.y, e.width, e.height));
  ctx.fillStyle='orange'; explosions.forEach(ex=>{ ctx.beginPath(); ctx.arc(ex.x,ex.y,ex.radius,0,Math.PI*2); ctx.fill(); });
  document.getElementById('score').innerText=`Score: ${score}`;
}

// Start overlay click
document.getElementById('startOverlay').addEventListener('click', ()=>{
  document.getElementById('startOverlay').style.display='none';
  update();
});
</script>

</body>
</html>
